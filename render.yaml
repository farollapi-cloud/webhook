# Blueprint Render: API (FastAPI) + Postgres + Static Site (Vite).
# Após o primeiro deploy: defina CORS_ORIGINS (URL do webhook-web) e VITE_API_URL (URL pública do webhook-api).
# Docs: https://render.com/docs/infrastructure-as-code

databases:
  - name: webhook-db
    databaseName: webhook_saas
    plan: free

services:
  - type: web
    runtime: python
    name: webhook-api
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    # Raiz (/) e /health respondem 200 — veja app/main.py
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: webhook-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: AUTH_CLIENT_ID
        value: admin
      - key: AUTH_CLIENT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        sync: false

  - type: web
    runtime: static
    name: webhook-web
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
